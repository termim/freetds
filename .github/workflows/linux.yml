name: Linux CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      SQLServer:
        image: mcr.microsoft.com/mssql/server:2017-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: sqlServerPassw0rd
        ports:
          - 1433:1433

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install libssl-dev libkrb5-dev libgnutls28-dev
        sudo apt-get install autoconf automake libtool
        sudo apt-get install gperf gettext

    - name: configure
      run: |
        autoreconf -i
        ./configure --with-gnutls  --enable-silent-rules --prefix=/tmp/freetds

    - name: make
      run: make

    - name: install
      run: |
        make install
        #pushd ./samples
        #sed -e 's,@libdir@,/tmp/freetds/lib,g' < unixodbc.freetds.driver.template.in > unixodbc.freetds.driver.template
        #cat unixodbc.freetds.driver.template
        #sudo ./unixodbc.install.sh
        #popd

    - name: make check
      env:
        TDSPWDUID: sa
        TDSPWDPWD: sqlServerPassw0rd
        TDSPWDSRV: localhost
        TDSPWDDB: tempdb
      run: |
        ./misc/write_PWD_from_env_vars.sh
        make -C src/tds/unittests check VERBOSE=1
        make -C src/dblib/unittests check VERBOSE=1
        make -C src/ctlib/unittests check VERBOSE=1
        make -C src/replacements/unittests check VERBOSE=1
        make -C src/utils/unittests check VERBOSE=1
        make -C src/apps/unittests check VERBOSE=1

    - name: make distcheck
      run: make distcheck
