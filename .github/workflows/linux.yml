name: Linux CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install libssl-dev libkrb5-dev libgnutls28-dev
        sudo apt-get install autoconf automake libtool
        sudo apt-get install gperf gettext

    - name: configure
      run: |
        autoreconf -i
        ./configure --with-gnutls  --enable-silent-rules

    - name: make
      run: make

    - name: make check
      run: make check

    - name: make distcheck
      run: make distcheck
